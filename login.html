<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Campus — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --neon-pink:    #ff2d78;
            --neon-pink-2:  #ff6bb5;
            --neon-white:   #ffffff;
            --bg-dark:      #050508;
            --bg-card:      rgba(255, 255, 255, 0.03);
            --border-dim:   rgba(255, 255, 255, 0.08);
            --border-pink:  rgba(255, 45, 120, 0.4);
            --glow-pink:    0 0 20px rgba(255, 45, 120, 0.5);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            color: var(--neon-white);
            display: flex; align-items: center; justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255, 45, 120, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 45, 120, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none;
        }

        .corner { position: fixed; width: 32px; height: 32px; }
        .corner::before, .corner::after { content: ''; position: absolute; background: var(--neon-pink); }
        .corner::before { width: 100%; height: 1px; }
        .corner::after  { width: 1px; height: 100%; }
        .corner-tl { top: 20px; left: 20px; }
        .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
        .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
        .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

        .login-card {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px;
            margin: 40px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-pink);
            padding: 52px 48px;
            clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 100%, 0% 100%);
            animation: cardAppear 0.6s ease both;
            backdrop-filter: blur(20px);
        }

        .login-card::before {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            box-shadow: 0 0 12px var(--neon-pink);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-header { text-align: center; margin-bottom: 40px; }

        .card-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem; letter-spacing: 4px;
            color: var(--neon-pink); text-transform: uppercase;
            display: block; margin-bottom: 12px;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--neon-pink-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            margin-top: 8px; font-size: 0.95rem;
            color: rgba(255,255,255,0.4);
            font-weight: 300; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 24px; }

        .form-label {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
        }

        .form-label .label-dot {
            width: 4px; height: 4px; background: var(--neon-pink);
            border-radius: 50%; display: inline-block;
        }

        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-dim);
            color: var(--neon-white);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 500;
            padding: 14px 18px; outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        }

        .form-input::placeholder { color: rgba(255,255,255,0.2); }

        .form-input:focus {
            border-color: var(--neon-pink);
            background: rgba(255, 45, 120, 0.05);
            box-shadow: 0 0 0 2px rgba(255, 45, 120, 0.15), inset 0 0 20px rgba(255, 45, 120, 0.05);
        }

        .form-input.error {
            border-color: #ff4444;
            box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.15);
        }

        .error-msg {
            margin-top: 6px; font-size: 0.8rem;
            color: #ff6b6b;
            display: flex; align-items: center; gap: 6px;
        }

        .error-msg::before {
            content: '!';
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px;
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 50%; font-size: 0.65rem;
            font-weight: 700; color: #ff4444; flex-shrink: 0;
        }

        .submit-btn {
            width: 100%; margin-top: 8px; padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--neon-white);
            background: linear-gradient(135deg, var(--neon-pink), #c4155a);
            border: none; cursor: pointer;
            position: relative; overflow: hidden;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
        }

        .submit-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--neon-pink-2), var(--neon-pink));
            opacity: 0; transition: opacity 0.3s ease;
        }

        .submit-btn:hover { box-shadow: var(--glow-pink), 0 8px 32px rgba(255, 45, 120, 0.4); transform: translateY(-2px); }
        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn span { position: relative; z-index: 1; }

        .back-link {
            display: block; text-align: center; margin-top: 24px;
            font-size: 0.85rem; color: rgba(255,255,255,0.3);
            text-decoration: none; letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: var(--neon-pink); }
        .back-link span { color: var(--neon-pink-2); }

        .form-divider { border: none; border-top: 1px solid var(--border-dim); margin: 28px 0; }

        .or-text {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem; letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            margin: -10px 0 20px;
        }

        .admin-link {
            display: block; text-align: center; padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.4); text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .admin-link:hover {
            border-color: var(--border-pink);
            color: var(--neon-pink);
            background: rgba(255,45,120,0.05);
        }
    </style>
</head>
<body>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="login-card">
        <div class="card-header">
            <span class="card-badge">// Identify Yourself</span>
            <h1 class="card-title">SIGN IN</h1>
            <p class="card-subtitle">Enter your details to access the campus</p>
        </div>

        <form th:action="@{/login}" th:object="${student}" method="post" novalidate>

            <div class="form-group">
                <label class="form-label" for="name">
                    <span class="label-dot"></span>Full Name
                </label>
                <input type="text" id="name"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'error'"
                       class="form-input"
                       placeholder="e.g. Arjun Sharma"
                       autocomplete="off"/>
                <div class="error-msg"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">
                    <span class="label-dot"></span>Email Address
                </label>
                <input type="email" id="email"
                       th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'error'"
                       class="form-input"
                       placeholder="e.g. arjun@college.edu"
                       autocomplete="off"/>
                <div class="error-msg"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">
                    <span class="label-dot"></span>Phone Number
                </label>
                <input type="tel" id="phone"
                       th:field="*{phone}"
                       th:classappend="${#fields.hasErrors('phone')} ? 'error'"
                       class="form-input"
                       placeholder="10-digit mobile number"
                       maxlength="10"
                       autocomplete="off"/>
                <div class="error-msg"
                     th:if="${#fields.hasErrors('phone')}"
                     th:errors="*{phone}"></div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Access Dashboard →</span>
            </button>
        </form>

        <a th:href="@{/}" class="back-link">← Back to <span>Home</span></a>
        <hr class="form-divider"/>
        <p class="or-text">ADMIN ACCESS</p>
        <a th:href="@{/admin/dashboard}" class="admin-link">
            ⚙ ADMIN PANEL — Requires Authorization
        </a>
    </div>
</body>
</html>
