<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error — Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root { --neon-pink: #ff2d78; --bg-dark: #050508; }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(255,45,120,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,45,120,0.04) 1px,transparent 1px); background-size:50px 50px; pointer-events:none; }
        .error-container { position:relative; z-index:1; padding:40px 20px; }
        .error-code { font-family:'Orbitron',sans-serif; font-size:clamp(4rem,15vw,10rem); font-weight:900; background:linear-gradient(135deg,var(--neon-pink),#ff6bb5); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; margin-bottom:16px; }
        .error-title { font-family:'Share Tech Mono',monospace; font-size:0.9rem; letter-spacing:4px; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:24px; }
        .error-msg { color:rgba(255,255,255,0.6); font-size:1rem; line-height:1.6; max-width:400px; margin:0 auto 36px; }
        .back-btn { display:inline-block; padding:14px 40px; font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:3px; color:#fff; text-decoration:none; border:1px solid var(--neon-pink); transition:all 0.3s; }
        .back-btn:hover { background:var(--neon-pink); box-shadow:0 0 20px rgba(255,45,120,0.5); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code" th:text="${status}">ERROR</div>
        <div class="error-title">// System Anomaly Detected</div>
        <p class="error-msg" th:text="${message} ?: 'Something went wrong. Please try again.'">Error message here</p>
        <a href="/" class="back-btn">← RETURN HOME</a>
    </div>
</body>
</html>
