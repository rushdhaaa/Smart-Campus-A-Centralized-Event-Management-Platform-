# ══════════════════════════════════════════════════════
#  Smart Campus Event Management — Application Config
# ══════════════════════════════════════════════════════

server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:campusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Schema and Data initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security: Admin credentials
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Logging
logging.level.com.campus=DEBUG
logging.level.org.springframework.security=INFO

# ── Google Gemini Configuration ───────────────────────
# Get your free key from: https://aistudio.google.com/app/apikey
# Replace the value below with your actual key
gemini.api.key=YOUR_KEY
gemini.api.model=YOUR_MODEL
